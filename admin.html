</style></head><body>
<div id=loginScreen><div class=login><p style=font-size:2rem>рЯФР</p><h2>зФ≤е§©дЄЛзЊОеҐЕ</h2><p>иѓЈиЊУеЕ•зЃ°зРЖеѓЖз†Б</p><input type=password id=pwd placeholder=еѓЖз†Б autofocus><p id=err style=color:#9B3A3A;font-size:.75rem;display:none>еѓЖз†БйФЩиѓѓ</p><button class=btn onclick=checkPwd() style=width:100%>жЯ•зЬЛжПРдЇ§</button></div></div>

<script>

var LB={customerName:'еЃҐжИЈеІУеРН',customerPhone:'зФµиѓЭ',buildLocation:'еЬ∞еЭА',houseWidth:'жИње±ЛйЭҐеЃљ',houseDepth:'жИње±ЛињЫжЈ±',floors:'ж•Ље±В',plotWidth:'еЃЕеЯЇеЬ∞йЭҐеЃљ',plotDepth:'еЃЕеЯЇеЬ∞ињЫжЈ±',yardPosition:'йЩҐе≠РдљНзљЃ',frontYardWidth:'еЙНйЩҐйЭҐеЃљ',frontYardDepth:'еЙНйЩҐињЫжЈ±',backYardWidth:'еРОйЩҐйЭҐеЃљ',backYardDepth:'еРОйЩҐињЫжЈ±',eastYardWidth:'дЄЬдЊІйЩҐйЭҐеЃљ',eastYardDepth:'дЄЬдЊІйЩҐињЫжЈ±',westYardWidth:'и•њдЊІйЩҐйЭҐеЃљ',westYardDepth:'и•њдЊІйЩҐињЫжЈ±',windowFrontHeight:'еЙНз™Чз¶їеЬ∞',windowFrontWinWidth:'еЙНз™ЧеЃљеЇ¶',windowFrontWinHeight:'еЙНз™ЧйЂШеЇ¶',windowBackHeight:'еРОз™Чз¶їеЬ∞',windowBackWinWidth:'еРОз™ЧеЃљеЇ¶',windowBackWinHeight:'еРОз™ЧйЂШеЇ¶',windowEastHeight:'дЄЬз™Чз¶їеЬ∞',windowEastWinWidth:'дЄЬз™ЧеЃљеЇ¶',windowEastWinHeight:'дЄЬз™ЧйЂШеЇ¶',windowWestHeight:'и•њз™Чз¶їеЬ∞',windowWestWinWidth:'и•њз™ЧеЃљеЇ¶',windowWestWinHeight:'и•њз™ЧйЂШеЇ¶',noWindowSides:'дЄНзХЩз™ЧйЭҐ',dirEast:'дЄЬйЭҐжГЕеЖµ',dirSouth:'еНЧйЭҐжГЕеЖµ',dirWest:'и•њйЭҐжГЕеЖµ',dirNorth:'еМЧйЭҐжГЕеЖµ',style:'й£Ож†Љ',budget:'йҐДзЃЧ',startDate:'еЉАеЈ•жЧґйЧі',specialReq:'зЙєжЃКи¶Бж±В',sketchFileName:'еє≥йЭҐиНЙеЫЊ'};

document.getElementById('pwd').addEventListener('keydown',function(e){if(e.key==='Enter')checkPwd()});

function checkPwd(){
  var v=document.getElementById('pwd').value;
  if(v===PWD){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('main').style.display='block';
    load();
  }else{
    document.getElementById('err').style.display='block';
    document.getElementById('pwd').value='';

function load(){
  document.getElementById('list').innerHTML='<div class=empty>еК†иљљдЄ≠...</div>';
  fetch(API)
  .then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  })
  .then(function(issues){
    if(!Array.isArray(issues)){
      document.getElementById('list').innerHTML='<div class=empty><p style=font-size:2.5rem>вЪ†пЄП</p><p>жХ∞жНЃж†ЉеЉПйФЩиѓѓ</p><button class=btn onclick=load()>йЗНиѓХ</button></div>';
      return;
    }
    document.getElementById('cnt').textContent='еЕ± '+issues.length+' жЭ°';
    if(!issues.length){
      document.getElementById('list').innerHTML='<div class=empty><p style=font-size:3rem>рЯУ≠</p><p>жЪВжЧ†еЃҐжИЈжПРдЇ§</p><button class=btn onclick=load() style=margin-top:12px>еИЈжЦ∞</button></div>';
      return;
    }
    var html='';
    issues.forEach(function(issue,i){
      var body=issue.body||'', lines=body.split('\n'), all=[], sum='';
      lines.forEach(function(line){
        var m=line.match(/- \*\*(.+?)\*\*[пЉЪ:](.+)/);
        if(m&&LB[m[1]]){
          var l=LB[m[1]],v=m[2].trim();
          all.push({l:l,v:v});
          if(all.length<=4) sum+='<b>'+es(l)+'</b>пЉЪ'+es(v)+'<br>';
        }
      });
      var did='det'+issue.number;
      var more=all.length>4?'<div class=more>рЯУЛ зВєеЗїе±ХеЉАеЕ®йГ® '+all.length+' й°є</div>':'';
      var rows=all.map(function(f){return '<tr><td>'+es(f.l)+'</td><td>'+es(f.v)+'</td></tr>'}).join('');
      var dateStr=issue.created_at?new Date(issue.created_at).toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'}):'жЬ™зЯ•жЧґйЧі';
      html+='<div class=card onclick=toggleDetail("'+did+'")><h2>'+es(issue.title)+'</h2><div class=meta>'+dateStr+'</div><div class=sum>'+sum+more+'</div><div class=det id='+did+'><table style=width:100%>'+rows+'</table></div></div>';
    });
    document.getElementById('list').innerHTML=html;
  })
  .catch(function(err){

    document.getElementById('list').innerHTML='<div class=empty><p style=font-size:3rem>вЪ†пЄП</p><p>зљСзїЬйФЩиѓѓпЉЪ'+es(err.message)+'</p><button class=btn onclick=load() style=margin-top:12px>йЗНиѓХ</button></div>';
  });
}

function toggleDetail(id){
  var d=document.getElementById(id);
  if(d) d.style.display=d.style.display==='none'?'block':'none';
}

function es(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
